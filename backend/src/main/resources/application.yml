spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: quickcart-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
      validation-timeout: 3000
      connection-test-query: SELECT 1
  # NOTE: ddl-auto is "update", not "none" — Hibernate WILL auto-alter tables to
  # match entity mappings on top of whatever schema.sql creates. schema.sql is now
  # written to be fully self-sufficient (all entity-level constraints like unique
  # columns are declared explicitly in schema.sql itself), so ddl-auto is a backstop,
  # not a dependency. Before flipping this to "validate" or "none" in production,
  # audit ALL entities against schema.sql (not just the auth-related ones) — this
  # was NOT done as part of the OTP/forgot-password fix; only OtpRequest,
  # PasswordResetToken, and User were verified.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:seed.sql
      continue-on-error: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000

jwt:
  secret: ${JWT_SECRET}
  expirationMs: 86400000 # 24 hours

server:
  port: 8082

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,https://quickcart01.vercel.app}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_TG4Dgisjo7B8Wa}
  key-secret: ${RAZORPAY_KEY_SECRET:6ZxhtPrU4uSB3vxWIkhqFFXj}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:bd5fzceu}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

ai:
  groq:
    api-key: ${GROQ_API_KEY:}
  nvidia:
    api-key: ${NVIDIA_API_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  xai:
    api-key: ${XAI_API_KEY:}

---
spring:
  config:
    activate:
      on-profile: dev