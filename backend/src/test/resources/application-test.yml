spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/quickcart?sslmode=disable
    username: ${TEST_DB_USER:postgres}
    password: ${TEST_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # create-drop: Hibernate builds schema from entities on startup and drops on shutdown.
      # This removes the dependency on schema.sql (which requires PostGIS) in tests.
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Do NOT run schema.sql or seed.sql in tests – they require PostGIS / pgvector
  # extensions that may not be present in the test database.
  sql:
    init:
      mode: never