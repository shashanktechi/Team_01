spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/quickcart?sslmode=disable
    username: ${TEST_DB_USER:postgres}
    password: ${TEST_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    # Testcontainers will manage the PostgreSQL container with PostGIS and pgvector extensions
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always